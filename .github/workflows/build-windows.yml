name: Build Windows portable

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: read
  actions: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller --clean --noconfirm PlexInventory.spec

      - name: Create portable ZIP
        shell: pwsh
        run: |
          if (Test-Path PlexInventory-windows-portable.zip) {
            Remove-Item PlexInventory-windows-portable.zip
          }
          Compress-Archive -Path dist\PlexInventory\* -DestinationPath PlexInventory-windows-portable.zip

      - name: Delete previous Windows portable artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $repo = "${{ github.repository }}"
          $artifactName = "PlexInventory-windows-portable"
          $headers = @{
            Authorization = "Bearer $env:GH_TOKEN"
            Accept = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
          }

          $url = "https://api.github.com/repos/$repo/actions/artifacts?per_page=100&name=$artifactName"
          $response = Invoke-RestMethod -Method Get -Uri $url -Headers $headers
          $count = 0

          foreach ($artifact in $response.artifacts) {
            Write-Host "Deleting old artifact $($artifact.id): $($artifact.name) ($($artifact.size_in_bytes) bytes)"
            $deleteUrl = "https://api.github.com/repos/$repo/actions/artifacts/$($artifact.id)"
            Invoke-RestMethod -Method Delete -Uri $deleteUrl -Headers $headers
            $count += 1
          }

          Write-Host "Deleted $count previous artifact(s)."

      - name: Upload artifact
        # Keep retention short to avoid exhausting GitHub Actions artifact storage.
        uses: actions/upload-artifact@v4
        with:
          name: PlexInventory-windows-portable
          path: PlexInventory-windows-portable.zip
          retention-days: 1
